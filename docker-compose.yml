services:
  mysql:
    image: mysql:8.0
    container_name: gameshelf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Santiago
    ports:
      - "3308:3306"
    volumes:
      - gameshelf_mysql_data:/var/lib/mysql
    networks:
      - gameshelf-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    image: eclipse-temurin:24-jre
    container_name: gameshelf-eureka
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/eureka-server.jar:/app/app.jar
    command: ["java", "-jar", "app.jar", "--spring.profiles.active=docker"]
    ports:
      - "8761:8761"
    networks:
      - gameshelf-net

  ms-roles:
    image: eclipse-temurin:24-jre
    container_name: gameshelf-ms-roles
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/ms-roles.jar:/app/app.jar
    command: ["java", "-jar", "app.jar", "--spring.profiles.active=docker"]
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - gameshelf-net

  ms-usuario:
    image: eclipse-temurin:24-jre
    container_name: gameshelf-ms-usuario
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/ms-usuario.jar:/app/app.jar
    command: ["java", "-jar", "app.jar", "--spring.profiles.active=docker"]
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      ms-roles:
        condition: service_started
    networks:
      - gameshelf-net

  ms-categoria:
