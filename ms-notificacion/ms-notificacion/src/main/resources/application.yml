server:
  port: 8089

spring:
  application:
    name: ms-notificacion

  datasource:
    url: jdbc:mysql://localhost:3306/db_notificacion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true