server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ms-usuario
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**

        - id: ms-roles
          uri: http://localhost:8082
          predicates:
            - Path=/api/roles/**

        - id: ms-videojuego
          uri: http://localhost:8083
          predicates:
            - Path=/api/videojuegos/**

        - id: ms-categoria
          uri: http://localhost:8084
          predicates:
            - Path=/api/categorias/**

        - id: ms-stock
          uri: http://localhost:8085
          predicates:
            - Path=/api/stocks/**

        - id: ms-prestamo
          uri: http://localhost:8086
          predicates:
            - Path=/api/prestamos/**

        - id: ms-multa
          uri: http://localhost:8087
          predicates:
            - Path=/api/multas/**

        - id: ms-reserva
          uri: http://localhost:8088
          predicates:
            - Path=/api/reservas/**

        - id: ms-notificacion
          uri: http://localhost:8089
          predicates:
            - Path=/api/notificaciones/**

        - id: ms-autorizacion
          uri: http://localhost:8090
          predicates:
            - Path=/api/autorizaciones/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/